<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Signing you in... — The Great Project</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0D0D0D;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .box{background:#141414;border:1px solid #272727;border-radius:12px;padding:40px;text-align:center;max-width:420px;width:90%}
    .logo{width:140px;filter:invert(1);margin-bottom:28px}
    .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#F04E00;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    h2{color:#EEE;font-size:18px;font-weight:600;margin-bottom:8px}
    p{color:#AAA;font-size:14px}
    .error{color:#F87171;font-size:13px;margin-top:12px;display:none}
  </style>
</head>
<body>
<div class="box">
  <img class="logo" src="https://assets.checkoutchamp.com/2d8e50c5-da34-457b-b2d0-7493b7f0290f/1774897149752_1765912829614_Logo_horizontal_black.png" alt="TGP"/>
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Signing you in...</h2>
  <p id="msg">Please wait while we verify your link.</p>
  <p class="error" id="err"></p>
</div>

<script>
  var PROXY_URL = 'https://customer-portal-vl02.onrender.com';
  var LOGIN_URL = 'https://try.thegreatproject.com/login';

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'Link Invalid';
    document.getElementById('msg').textContent = 'Please request a new login link.';
    var e = document.getElementById('err');
    e.textContent = msg;
    e.style.display = 'block';
  }

  async function run() {
    var params = new URLSearchParams(window.location.search);
    var token  = params.get('token');
    if (!token) { showError('No token found in URL.'); return; }

    try {
      /* 1. Verify token on Render server */
      var res  = await fetch(PROXY_URL + '/magic-login/verify?token=' + encodeURIComponent(token));
      var data = await res.json();

      if (!res.ok || !data.success) {
        showError(data.error || 'Login failed.');
        return;
      }

      if (data.status !== 'ACTIVE') {
        showError('Your membership is ' + data.status + '. Please contact support.');
        return;
      }

      document.getElementById('title').textContent = 'Verified!';
      document.getElementById('msg').textContent = 'Logging you in...';

      /* 2. Pass credentials via URL params to CC login page
            Base64 encode to avoid special character issues    */
      var e = btoa(data.email);
      var p = btoa(data.password);

      setTimeout(function() {
        window.location.href = LOGIN_URL + '?ml=1&e=' + encodeURIComponent(e) + '&p=' + encodeURIComponent(p);
      }, 500);

    } catch(err) {
      showError('Error: ' + err.message);
    }
  }

  run();
</script>
</body>
</html>
