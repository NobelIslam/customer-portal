<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Signing you in... — The Great Project</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0D0D0D;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .box{background:#141414;border:1px solid #272727;border-radius:12px;padding:40px;text-align:center;max-width:420px;width:90%}
    .logo{width:140px;filter:invert(1);margin-bottom:28px}
    .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#F04E00;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    h2{color:#EEE;font-size:18px;font-weight:600;margin-bottom:8px}
    p{color:#AAA;font-size:14px}
    .error{color:#F87171;font-size:13px;margin-top:12px;display:none}
  </style>
</head>
<body>
<div class="box">
  <img class="logo" src="https://assets.checkoutchamp.com/2d8e50c5-da34-457b-b2d0-7493b7f0290f/1774897149752_1765912829614_Logo_horizontal_black.png" alt="TGP"/>
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Signing you in...</h2>
  <p id="msg">Please wait while we verify your link.</p>
  <p class="error" id="err"></p>
</div>

<script>
  var PROXY_URL      = 'https://customer-portal-vl02.onrender.com';
  var PORTAL_URL     = 'https://try.thegreatproject.com/memberarea';
  var LOGIN_URL      = 'https://try.thegreatproject.com/login';
  var CC_PAGES_API   = 'https://pages-live-api.checkoutchamp.com';
  var COMPANY_TOKEN  = 'ef04a8c0-b281-11ef-82be-b17d7998efda';
  var FUNNEL_REF     = 'b0267726-11c5-491f-bdd5-62cfd0a19248';
  var PAGE_REF       = '0b5879a8-c6a0-4cf0-a9ea-c3784d277eec';

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'Link Invalid';
    document.getElementById('msg').textContent = 'Please request a new login link.';
    var e = document.getElementById('err');
    e.textContent = msg;
    e.style.display = 'block';
  }

  function setMsg(msg) {
    document.getElementById('msg').textContent = msg;
  }

  async function run() {
    var params = new URLSearchParams(window.location.search);
    var token  = params.get('token');
    if (!token) { showError('No token found in URL.'); return; }

    try {
      /* Step 1: Call UseSession from browser to get browser-linked sessionId */
      setMsg('Initializing session...');
      var sessionRes = await fetch(CC_PAGES_API + '/providersApi/V1/ImportClick/UseSession', {
        method: 'POST',
        headers: {
          'Content-Type':      'application/json',
          'Companytoken':      COMPANY_TOKEN,
          'Funnelreferenceid': FUNNEL_REF
        },
        body: JSON.stringify({
          pageType:          'presellPage',
          sessionId:         '',
          funnelName:        'Customer portal',
          funnelReferenceId: FUNNEL_REF,
          pageName:          'Login',
          pageReferenceId:   PAGE_REF,
          campaignId:        87,
          requestUri:        'https://try.thegreatproject.com/login',
          userAgent:         navigator.userAgent
        })
      });
      var sessionData = await sessionRes.json();
      console.log('UseSession:', sessionData);

      if (!sessionData.message || !sessionData.message.sessionId) {
        showError('Session init failed: ' + JSON.stringify(sessionData));
        return;
      }
      var realSessionId = sessionData.message.sessionId;

      /* Store sessionId in CC's expected key */
      var sessionObj = { result: 'SUCCESS', message: { sessionId: realSessionId, affVals: {} } };
      sessionStorage.setItem('sessionId',           JSON.stringify(sessionObj));
      sessionStorage.setItem('ccExternalSessionId', realSessionId);

      /* Step 2: Send token + sessionId to our server for login */
      setMsg('Verifying your link...');
      var verifyRes  = await fetch(PROXY_URL + '/magic-login/verify', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token: token, sessionId: realSessionId })
      });
      var data = await verifyRes.json();
      console.log('Verify:', data);

      if (!verifyRes.ok || !data.success) { showError(data.error || 'Login failed.'); return; }

      /* Step 3: Set all session data CC needs */
      var ss  = sessionStorage;
      var ls  = localStorage;
      var msg = data.loginData && data.loginData.message ? data.loginData.message : {};

      if (msg.membership)        ss.setItem('membership',        JSON.stringify(msg.membership));
      if (msg.clubMemberships)   ss.setItem('clubMemberships',   JSON.stringify(msg.clubMemberships));
      if (msg.customerOrders)    ss.setItem('customerOrders',    JSON.stringify(msg.customerOrders));
      if (msg.customerPurchases) ss.setItem('customerPurchases', JSON.stringify(msg.customerPurchases));
      if (msg.funnelData)        ss.setItem('funnelData',        JSON.stringify(msg.funnelData));

      if (!msg.membership) {
        var m = { emailAddress: data.email, clubUsername: data.email, clubId: 12, status: 'ACTIVE' };
        ss.setItem('membership',      JSON.stringify(m));
        ss.setItem('clubMemberships', JSON.stringify([m]));
      }

      ss.setItem('loginPageUrl',         LOGIN_URL + '?alertMessage=Access%20Denied');
      ss.setItem('sessionStartDateTime', new Date().toISOString());
      ls.setItem('isMembershipLogin',    'true');
      ls.setItem('loginUrl',             LOGIN_URL);

      document.getElementById('title').textContent = 'Logged in!';
      setMsg('Redirecting to your dashboard...');

      setTimeout(function() { window.location.href = PORTAL_URL; }, 600);

    } catch(err) { showError('Error: ' + err.message); }
  }

  run();
</script>
</body>
</html>
